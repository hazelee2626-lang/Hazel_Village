<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#10121f">
<title>🏘️ 하젤마을 — Dream Village</title>
<style>
@font-face{
  font-family:'DungGeunMo';
  src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/DungGeunMo.woff') format('woff');
  font-display:swap;
}
:root{
  --sky:#10121f; --bg:#1a1c2c; --panel:#252a45; --panel2:#2f3558;
  --line:#566c86; --line2:#94b0c2;
  --ink:#f4f4f4; --dim:#94b0c2;
  --gold:#ffcd75; --red:#c2495e; --blue:#41a6f6;
  --green:#38b764; --orange:#ef7d57; --pink:#d867c0; --cyan:#73eff7;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'DungGeunMo',monospace;
  background:var(--sky);color:var(--ink);
  min-height:100vh;max-width:560px;margin:0 auto;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
  image-rendering:pixelated;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0 1px,transparent 1px 3px);
  opacity:.45;
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
}

/* ── screens ── */
.screen{display:none;padding:12px 12px 8px}
.screen.on{display:block}

/* ── RPG window ── */
.win{
  background:var(--panel);border:3px solid var(--ink);border-radius:2px;
  box-shadow:0 0 0 3px var(--sky),0 0 0 5px var(--line),5px 7px 0 rgba(0,0,0,.45);
  padding:14px;margin:0 4px 22px;position:relative;
}
.win-tag{
  position:absolute;top:-13px;left:10px;background:var(--sky);
  border:2px solid var(--ink);padding:2px 10px;
  font-size:.7rem;color:var(--gold);letter-spacing:1px;
}

/* ── header ── */
.hdr{text-align:center;padding:16px 0 10px}
.hdr h1{font-size:1.3rem;letter-spacing:3px;color:var(--gold);text-shadow:2px 2px 0 #7d3f38,4px 4px 0 rgba(0,0,0,.5)}
.hdr .sub{font-size:.64rem;color:var(--dim);margin-top:6px;letter-spacing:1px}
.blink{animation:blink 1.2s steps(2) infinite}
@keyframes blink{50%{opacity:0}}

/* ── HUD ── */
.hud{display:flex;gap:8px;justify-content:center;margin:8px 4px 16px;flex-wrap:wrap}
.hud .chip{
  background:var(--panel);border:2px solid var(--line);
  font-size:.66rem;color:var(--dim);padding:6px 10px;
}
.hud .chip b{color:var(--gold)}

/* ── village scene ── */
.scene-wrap{
  border:3px solid var(--ink);
  box-shadow:0 0 0 3px var(--sky),0 0 0 5px var(--line),5px 7px 0 rgba(0,0,0,.45);
  margin:0 4px 10px;overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;background:var(--sky);
}
.scene-wrap > svg{display:block;height:400px;width:auto}
.scroll-hint{text-align:center;font-size:.62rem;color:var(--dim);margin-bottom:20px}
.bpoi{cursor:pointer}
.bpoi:active .bglow{opacity:.5}

/* scene animations */
.tw{animation:tw 2.4s steps(2) infinite}
.tw2{animation:tw 3.1s steps(2) infinite 1.1s}
@keyframes tw{50%{opacity:.15}}
.ff{animation:ff 4s ease-in-out infinite}
.ff2{animation:ff 5s ease-in-out infinite 1.6s}
@keyframes ff{0%,100%{transform:translate(0,0);opacity:.9}50%{transform:translate(10px,-14px);opacity:.3}}
.smoke{animation:smoke 3s steps(5) infinite}
.smoke2{animation:smoke 3s steps(5) infinite 1.4s}
@keyframes smoke{0%{transform:translateY(0);opacity:.7}100%{transform:translateY(-26px);opacity:0}}
.flagw{animation:flagw 1.4s steps(2) infinite;transform-box:fill-box;transform-origin:left center}
@keyframes flagw{50%{transform:scaleY(.86)}}
.hz-idle{animation:hz 1.2s steps(2) infinite}
@keyframes hz{50%{transform:translateY(-3px)}}

/* ── bars & buttons ── */
.bar{height:14px;background:#141625;border:2px solid var(--line);overflow:hidden}
.bar>i{display:block;height:100%;transition:width .45s steps(8);
  background:repeating-linear-gradient(90deg,var(--c,var(--gold)) 0 6px,color-mix(in srgb,var(--c,var(--gold)) 70%,black) 6px 8px)}
.btn{
  font-family:inherit;font-size:.8rem;cursor:pointer;border-radius:0;
  background:var(--gold);color:#3a2410;border:2px solid var(--ink);
  box-shadow:3px 3px 0 rgba(0,0,0,.5);padding:11px;letter-spacing:1px;
}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.5)}
.btn:focus-visible,.chk:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
.btn.ghost{background:var(--panel2);color:var(--ink);font-size:.7rem;padding:8px 12px}

/* ── detail screen ── */
.d-hero{
  background:linear-gradient(#141628,#1d2136);
  border:2px solid var(--line);padding:18px 8px 6px;
  display:flex;justify-content:center;margin-bottom:12px;position:relative;overflow:hidden;
}
.d-lvchip{position:absolute;top:8px;right:8px;font-size:.66rem;color:var(--gold);background:rgba(16,18,31,.8);border:2px solid var(--line);padding:3px 8px}
.d-meta{font-size:.72rem;color:var(--dim);line-height:2}
.d-meta b{color:var(--ink)}
.d-next{font-size:.68rem;color:var(--cyan);margin-top:6px}

/* ── quest bits ── */
.qform{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.qform input[type=text]{
  font-family:inherit;font-size:.85rem;color:var(--ink);
  background:#141625;border:2px solid var(--line);padding:10px;width:100%;border-radius:0;
}
.qform input:focus{outline:2px solid var(--gold);outline-offset:1px}
.qrow{display:flex;gap:8px}
.qrow select{
  flex:1;font-family:inherit;font-size:.74rem;color:var(--ink);
  background:#141625;border:2px solid var(--line);padding:9px 6px;border-radius:0;
  appearance:none;-webkit-appearance:none;
}
.quest{display:flex;align-items:center;gap:10px;background:var(--panel2);border:2px solid var(--line);padding:10px;margin-bottom:9px}
.quest .chk{
  width:26px;height:26px;flex-shrink:0;cursor:pointer;background:#141625;
  border:2px solid var(--line2);color:var(--gold);font-size:.9rem;
  display:flex;align-items:center;justify-content:center;font-family:inherit;
}
.quest .qt{flex:1;min-width:0;font-size:.8rem;line-height:1.45;word-break:break-word}
.quest .qm{font-size:.6rem;color:var(--dim);margin-top:3px}
.quest .del{background:none;border:none;color:#6b7396;font-family:inherit;font-size:.85rem;cursor:pointer;padding:4px}
.empty{text-align:center;color:var(--dim);font-size:.72rem;padding:18px 8px;line-height:1.9}
.qcount{font-size:.66rem;color:var(--dim);text-align:right;margin-bottom:10px}

/* ── home screen ── */
.home-hero{
  background:linear-gradient(#141628,#1d2136);
  border:2px solid var(--line);padding:20px 8px 0;margin-bottom:12px;
  display:flex;justify-content:center;align-items:flex-end;gap:6px;overflow:hidden;
}
.h-meta{font-size:.72rem;color:var(--dim);line-height:2}
.h-meta b{color:var(--ink)}
.h-title{color:var(--gold)}
.stat{display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:2px dotted #3a415f}
.stat:last-child{border-bottom:none}
.stat .ico{width:24px;text-align:center;flex-shrink:0}
.stat .meta{flex:1;min-width:0}
.stat .nm{font-size:.72rem;display:flex;justify-content:space-between;margin-bottom:5px}
.stat .lv{color:var(--gold)}
.dream{display:flex;gap:8px;font-size:.7rem;color:var(--ink);padding:7px 2px;border-bottom:2px dotted #3a415f;line-height:1.6}
.dream:last-child{border-bottom:none}
.dream .dd{color:#6b7396;flex-shrink:0;font-size:.6rem;padding-top:2px}
.radar-wrap{display:flex;justify-content:center}

/* ── floating xp ── */
.fxp{position:fixed;z-index:1200;pointer-events:none;font-size:.9rem;color:var(--gold);
  text-shadow:2px 2px 0 #000;animation:fxp .9s steps(6) forwards}
@keyframes fxp{to{transform:translateY(-46px);opacity:0}}

/* ── modal ── */
.mod{position:fixed;inset:0;z-index:1100;background:rgba(8,9,18,.8);display:none;align-items:center;justify-content:center;padding:20px}
.mod.on{display:flex}
.mod-box{background:var(--panel);border:3px solid var(--ink);box-shadow:0 0 0 3px var(--sky),0 0 0 5px var(--line);
  padding:24px 20px;text-align:center;max-width:330px;width:100%;animation:pop .3s steps(4)}
@keyframes pop{from{transform:scale(.7)}}
.mod-big{font-size:1.1rem;color:var(--gold);letter-spacing:2px;text-shadow:2px 2px 0 #7d3f38;margin-bottom:12px;animation:blink 1s steps(2) infinite}
.mod-art{display:flex;justify-content:center;margin:10px 0 6px;max-height:190px;overflow:hidden;align-items:flex-end}
.mod-txt{font-size:.78rem;line-height:1.9}
.mod-txt b{color:var(--cyan)}
.mod .btn{margin-top:16px;width:100%}

/* ── bottom nav ── */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:560px;z-index:900;
  display:flex;background:var(--panel);border-top:3px solid var(--ink);
  padding-bottom:env(safe-area-inset-bottom);
}
.nav button{
  flex:1;font-family:inherit;font-size:.74rem;color:var(--dim);
  background:none;border:none;padding:14px 0 12px;cursor:pointer;letter-spacing:1px;
}
.nav button.on{color:var(--gold);background:var(--panel2)}
.foot{text-align:center;font-size:.58rem;color:#565e80;line-height:2;padding:4px 0 14px}
.foot button{background:none;border:none;color:#565e80;font-family:inherit;font-size:.58rem;text-decoration:underline;cursor:pointer}
</style>
</head>
<body>

<!-- ═══════ VILLAGE ═══════ -->
<section class="screen on" id="scrVillage">
  <header class="hdr">
    <h1>🏘️ 하젤마을</h1>
    <div class="sub">레벨업할수록 마을이 지어진다 <span class="blink">▶</span></div>
  </header>
  <div class="hud">
    <span class="chip">촌장 하젤 <b id="hudLv">Lv.1</b></span>
    <span class="chip">오늘 클리어 <b id="hudToday">0</b></span>
    <span class="chip">진행 퀘스트 <b id="hudQuests">0</b></span>
  </div>
  <div class="scene-wrap" id="sceneWrap"></div>
  <div class="scroll-hint">◀ 옆으로 스크롤해서 마을 구경 · 건물을 탭하면 입장 ▶</div>
</section>

<!-- ═══════ BUILDING DETAIL ═══════ -->
<section class="screen" id="scrDetail">
  <div style="padding:14px 4px 6px"><button class="btn ghost" id="dBack">← 마을로</button></div>
  <div class="win" style="margin-top:16px">
    <span class="win-tag" id="dTag">건물</span>
    <div class="d-hero"><div id="dBuild"></div><div class="d-lvchip" id="dLvChip"></div></div>
    <div class="d-meta">
      <div id="dStageNm"><b>—</b></div>
      <div>다음 레벨까지 <b id="dBarTxt">0/100</b></div>
    </div>
    <div class="bar" style="margin-top:6px"><i id="dBar" style="width:0%"></i></div>
    <div class="d-next" id="dNext"></div>
  </div>
  <div class="win">
    <span class="win-tag">이곳의 퀘스트</span>
    <div class="qform">
      <input type="text" id="dQText" maxlength="60" placeholder="이 공간에서 할 일을 입력…" autocomplete="off">
      <div class="qrow">
        <select id="dQDiff" aria-label="난이도 선택">
          <option value="10">쉬움 +10 XP</option>
          <option value="25" selected>보통 +25 XP</option>
          <option value="50">어려움 +50 XP</option>
        </select>
        <button class="btn" id="dQAdd" style="flex:1">＋ 등록</button>
      </div>
    </div>
    <div class="qcount" id="dQCount"></div>
    <div id="dQList"></div>
  </div>
</section>

<!-- ═══════ HOME ═══════ -->
<section class="screen" id="scrHome">
  <header class="hdr">
    <h1>🏠 하젤의 집</h1>
    <div class="sub">꿈이 이루어질수록 집이 견고해진다</div>
  </header>
  <div class="win" style="margin-top:20px">
    <span class="win-tag">MY HOME</span>
    <div class="home-hero"><div id="hHouse"></div><div id="hSprite" class="hz-idle" style="margin-bottom:0"></div></div>
    <div class="h-meta">
      <div>🏠 <b id="hHouseNm">—</b></div>
      <div>촌장 하젤 <b id="hLv">Lv.1</b> · 칭호 <span class="h-title" id="hTitle">견습 모험가</span></div>
      <div>총 클리어 <b id="hClear">0</b>회</div>
    </div>
  </div>
  <div class="win">
    <span class="win-tag">능력치</span>
    <div class="radar-wrap"><svg id="radar" width="248" height="216" viewBox="0 0 248 216" role="img" aria-label="6방향 능력치 차트"></svg></div>
  </div>
  <div class="win">
    <span class="win-tag">브랜치 레벨</span>
    <div id="hStats"></div>
  </div>
  <div class="win">
    <span class="win-tag">이루어진 드림</span>
    <div id="dreamList"></div>
  </div>
  <div class="foot">
    HAZEL VILLAGE v2.0 · 조금씩 꾸준히 뭐라도 하면 성장하겠지<br>
    <button id="resetBtn">데이터 초기화</button>
  </div>
</section>

<!-- ═══════ MODAL ═══════ -->
<div class="mod" id="mod" role="dialog" aria-modal="true">
  <div class="mod-box">
    <div class="mod-big" id="modBig">DREAM!</div>
    <div class="mod-art" id="modArt"></div>
    <div class="mod-txt" id="modTxt"></div>
    <button class="btn" id="modOk">확인</button>
  </div>
</div>

<!-- ═══════ NAV ═══════ -->
<nav class="nav">
  <button id="navVillage" class="on">🏘️ 마을</button>
  <button id="navHome">🏠 내 집</button>
</nav>

<script>
'use strict';
/* ═══════════ storage & migration ═══════════ */
const KEY='hazelVillage_v2', OLD_KEY='hazelQuest_v1';
let memFallback=null;
function todayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
const defaultState=()=>({
  xp:{work:0,focus:0,health:0,care:0,fun:0,habit:0},
  quests:[],log:[],dreams:[],cleared:0,today:{d:todayStr(),n:0},
});
function loadState(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw)return JSON.parse(raw);
    const old=localStorage.getItem(OLD_KEY);
    if(old){
      const o=JSON.parse(old), s=defaultState();
      s.xp=Object.assign(s.xp,o.xp||{});
      s.quests=o.quests||[]; s.log=o.log||[];
      s.cleared=o.cleared||0; s.today=o.today||s.today;
      return s;
    }
  }catch(e){}
  return memFallback;
}
function saveState(){memFallback=state;try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
let state=loadState()||defaultState();
if(!state.dreams)state.dreams=[];
if(state.today.d!==todayStr())state.today={d:todayStr(),n:0};

/* ═══════════ config ═══════════ */
const XP_PER_LEVEL=100;
const BUILD_LV=[1,3,6,10,15];   // branch level needed for building stage 1..5
const STATS=[
 {id:'work',ico:'⚔️',nm:'업무',sub:'K BBQ',c:'#c2495e',title:'K BBQ의 지배자',
  wall:'#7a4636',wallD:'#4d2b20',roof:'#b13e53',roofD:'#7d2b3a',motif:'lantern',
  stages:['포장마차','작은 식당','K BBQ 하우스','2층 대형 레스토랑','K BBQ 그랜드 본점']},
 {id:'focus',ico:'🧠',nm:'집중·학습',sub:'서재',c:'#41a6f6',title:'초집중의 현자',
  wall:'#3b5dc9',wallD:'#26398c',roof:'#29366f',roofD:'#1b2450',motif:'orb',
  stages:['낡은 책상','서재 오두막','하젤 도서관','현자의 서재탑','대현자의 마법탑']},
 {id:'health',ico:'🌿',nm:'건강·루틴',sub:'가든',c:'#38b764',title:'강철 체력의 기사',
  wall:'#3d7a4a',wallD:'#245231',roof:'#38b764',roofD:'#257943',motif:'plant',
  stages:['작은 텃밭','유리 온실','웰니스 가든','회복의 온천장','생명의 대정원']},
 {id:'care',ico:'✨',nm:'셀프케어',sub:'스파',c:'#d867c0',title:'빛나는 자기돌봄러',
  wall:'#8a4a7a',wallD:'#5a2c4e',roof:'#d867c0',roofD:'#9c4489',motif:'awning',
  stages:['손거울','파우더룸','뷰티 살롱','문라이트 스파','별빛 궁전 스파']},
 {id:'fun',ico:'🎨',nm:'일상·취미',sub:'아틀리에',c:'#ef7d57',title:'낭만 수집가',
  wall:'#a35b3a',wallD:'#6b3a24',roof:'#ef7d57',roofD:'#b0553a',motif:'flag',
  stages:['이젤 하나','아틀리에','작은 극장','예술가의 전당','드림 시네마 홀']},
 {id:'habit',ico:'🌙',nm:'습관·기록',sub:'시계탑',c:'#ffcd75',title:'꾸준함의 화신',
  wall:'#6e6046',wallD:'#453c2b',roof:'#ffcd75',roofD:'#b8924a',motif:'clock',
  stages:['모래시계','마을 우물','기록의 종탑','마을 시계탑','영원의 대시계탑']},
];
const HOUSE_STAGES=[
 {lv:1, nm:'작은 텐트'},
 {lv:4, nm:'통나무 오두막'},
 {lv:10,nm:'아늑한 목조집'},
 {lv:18,nm:'정원 딸린 벽돌집'},
 {lv:30,nm:'하젤 드림 저택'},
];
const CHAR_STAGES=[{min:1,nm:'견습 모험가'},{min:5,nm:'모험가 하젤'},{min:12,nm:'영웅 하젤'},{min:25,nm:'전설의 하젤'}];

/* ═══════════ derived ═══════════ */
const statLevel=id=>Math.floor((state.xp[id]||0)/XP_PER_LEVEL)+1;
const statProg=id=>(state.xp[id]||0)%XP_PER_LEVEL;
const totalLevel=()=>STATS.reduce((a,s)=>a+statLevel(s.id)-1,0)+1;
function buildStage(lv){let i=0;BUILD_LV.forEach((t,k)=>{if(lv>=t)i=k;});return i;}      // 0..4
function houseStage(lv){let i=0;HOUSE_STAGES.forEach((t,k)=>{if(lv>=t.lv)i=k;});return i;}
function charStage(lv){let i=0;CHAR_STAGES.forEach((t,k)=>{if(lv>=t.min)i=k;});return i;}
function currentTitle(){
  const max=Math.max(...STATS.map(s=>statLevel(s.id)));
  if(max<=1)return '견습 모험가';
  return STATS.filter(s=>statLevel(s.id)===max)[0].title;
}

/* ═══════════ pixel helpers ═══════════ */
function R(x,y,w,h,c,p){return '<rect x="'+(x*p)+'" y="'+(y*p)+'" width="'+(w*p)+'" height="'+(h*p)+'" fill="'+c+'"/>';}

/* ── character sprite (14x18) ── */
const PAL={H:'#4a2f1d',S:'#f0c8a0',E:'#1a1c2c',M:'#c2495e',P:'#333c57',W:'#f4f4f4',G:'#ffcd75',A:'#94b0c2',D:'#dce8f0',B:'#8a5a34',C:'#c2495e'};
const SPRITES=[
{pal:{B:'#8a5a34',C:'#c2495e'},map:["..............","...HHHHHHHH...","..HHHHHHHHHH..",".HHHHHHHHHHH..",".HHSSSSSSSHH..",".HHSESSSESHH..",".HHSSSSSSSHH..","..HSSSMSSSH...","...SSSSSSS....","..BBBBBBBBB...",".BBBBBBBBBBB..",".SBBBBBBBBBS..",".SBBBBBBBBBS..","..BBBBBBBBB...","..PPP...PPP...","..PPP...PPP...","..SSS...SSS...",".WWWW...WWWW.."]},
{pal:{B:'#38b764',C:'#c2495e'},map:["..............","...HHHHHHHH...","..HHHHHHHHHH..",".HCCCCCCCCCH..",".HHSSSSSSSHH..",".HHSESSSESHH..",".HHSSSSSSSHH..","..HSSSMSSSH...","..CCSSSSSCC...",".CBBBBBBBBBC..",".CBBBBBBBBBC..",".SBBBBBBBBBS..",".SBBBBBBBBBS..",".CBBBBBBBBBC..","..PPP...PPP...","..PPP...PPP...","..SSS...SSS...",".WWWW...WWWW.."]},
{pal:{B:'#94b0c2',C:'#c2495e'},map:[".............D","...HHHHHHHH..D","..HHHHHHHHHH.D",".HCCCCCCCCCH.D",".HHSSSSSSSHH.D",".HHSESSSESHH.D",".HHSSSSSSSHH.D","..HSSSMSSSH..D","..CCSSSSSCC..G",".CBBBGBBBBBC.G",".CBBGGGBBBBC..",".SBBBGBBBBBS..",".SBBBBBBBBBS..",".CBBBBBBBBBC..","..PPP...PPP...","..PPP...PPP...","..SSS...SSS...",".WWWW...WWWW.."]},
{pal:{B:'#94b0c2',C:'#7d3f98',P:'#4a2f6d'},map:["...G..G..G...D","...GGGGGGG...D","..HHHHHHHHHH.D",".HHHHHHHHHHH.D",".HHSSSSSSSHH.D",".HHSESSSESHH.D",".HHSSSSSSSHH.D","..HSSSMSSSH..D","..CCSSSSSCC..G",".CBGGGGGGGBC.G",".CBBBGBBBBBC..",".SBBGGGBBBBS..",".SBBBGBBBBBS..",".CBGGGGGGGBC..","..PPP...PPP...","..PPP...PPP...","..SSS...SSS...",".WWWW...WWWW.."]},
];
function spriteSVG(stageIdx,px){
  const s=SPRITES[stageIdx],pal=Object.assign({},PAL,s.pal);
  const w=s.map[0].length,h=s.map.length;let out='';
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const ch=s.map[y][x];if(ch!=='.')out+=R(x,y,1,1,pal[ch],px);
  }
  return '<svg width="'+(w*px)+'" height="'+(h*px)+'" shape-rendering="crispEdges">'+out+'</svg>';
}

/* ── procedural building generator ──
   returns {svg, W, H} in px units (cells * px) */
function buildingSVG(st,stage,px){
  const floors=stage+1;                 // stage 0..4 → 1..5 floors
  const W=10+stage*3;                   // cells wide
  const roofRows=3+Math.floor(stage/2);
  const floorH=6;
  const bodyH=floors*floorH+1;
  const H=roofRows+bodyH+1;             // total cells tall
  let o='';
  // glow for max stage
  if(stage>=4)o+='<rect x="0" y="0" width="'+(W*px)+'" height="'+(H*px)+'" fill="'+st.c+'" opacity=".12"/>';
  const top=roofRows;
  // body outline + wall
  o+=R(0,top,W,bodyH,st.wallD,px);
  o+=R(1,top+1,W-2,bodyH-2,st.wall,px);
  // floor divider lines
  for(let f=1;f<floors;f++)o+=R(1,top+f*floorH,W-2,1,st.wallD,px);
  // roof (stepped)
  for(let r=0;r<roofRows;r++){
    const inset=(roofRows-r)*Math.max(1,Math.round(W/14));
    const rw=W-inset*2+2;
    if(rw>0)o+=R(inset-1,r,rw,1,r===0?st.roofD:st.roof,px);
  }
  o+=R(-1,roofRows-1,W+2,1,st.roofD,px); // eave
  // windows per floor
  for(let f=0;f<floors;f++){
    const wy=top+1+f*floorH+1;
    for(let wx=2;wx<=W-4;wx+=4){
      const isGround=(f===floors-1);
      const doorL=Math.floor(W/2)-2,doorR=Math.floor(W/2)+2;
      if(isGround&&wx+2>doorL&&wx<doorR)continue;   // skip door area
      o+=R(wx,wy,2,3,'#5a4a20',px);
      o+=R(wx,wy,2,2,'#ffe9a8',px);
    }
  }
  // door (ground floor center)
  const dx=Math.floor(W/2)-2,dy=top+bodyH-5;
  o+=R(dx,dy,4,5,st.wallD,px);
  o+=R(dx+1,dy+1,2,4,'#2a1c10',px);
  o+=R(dx+2,dy+3,1,1,st.c,px);
  // sign above door (stage>=1)
  if(stage>=1){
    o+=R(dx-1,dy-4,6,3,'#141625',px);
    o+='<text x="'+((dx+2)*px)+'" y="'+((dy-1.7)*px)+'" text-anchor="middle" font-size="'+(px*2.1)+'">'+st.ico+'</text>';
  }
  /* motif per branch */
  const mid=Math.floor(W/2);
  if(st.motif==='lantern'){
    o+=R(1,top+1,1,1,'#3a2010',px)+R(1,top+2,2,3,'#e04040',px);
    o+=R(W-3,top+1,1,1,'#3a2010',px)+R(W-3,top+2,2,3,'#e04040',px);
  }else if(st.motif==='orb'){
    o+=R(mid,0,1,roofRows>2?2:1,'#8a9ab8',px)+R(mid-1,-1,3,2,'#73eff7',px);
  }else if(st.motif==='plant'){
    o+=R(0,top+bodyH-3,2,3,'#2a5a34',px)+R(W-2,top+bodyH-3,2,3,'#2a5a34',px);
    o+=R(0,top+bodyH-4,1,1,'#5adf84',px)+R(W-1,top+bodyH-4,1,1,'#5adf84',px);
  }else if(st.motif==='awning'){
    for(let a=1;a<W-1;a+=2)o+=R(a,roofRows,1,1,(a%4===1)?'#ffd6f0':st.c,px);
  }else if(st.motif==='flag'){
    o+=R(mid,-3,1,4,'#8a6020',px)+'<g class="flagw">'+R(mid+1,-3,3,2,st.c,px)+'</g>';
  }else if(st.motif==='clock'){
    o+=R(mid-2,1,4,4,'#141625',px)+R(mid-1,2,2,2,'#ffcd75',px);
  }
  // chimney + smoke for restaurant
  if(st.motif==='lantern'&&stage>=2){
    o+=R(W-4,-2,2,3,'#5a3a2a',px);
    o+='<g class="smoke">'+R(W-4,-4,1,1,'#8a92a8',px)+'</g><g class="smoke2">'+R(W-3,-5,1,1,'#8a92a8',px)+'</g>';
  }
  const padTop=6; // cells of headroom for motifs above roof
  return {svg:'<svg width="'+((W+2)*px)+'" height="'+((H+padTop)*px)+'" shape-rendering="crispEdges" style="overflow:visible"><g transform="translate('+px+','+(padTop*px)+')">'+o+'</g></svg>',
          W:(W+2)*px,H:(H+padTop)*px};
}

/* ── house generator (5 stages, gets sturdier) ── */
function houseSVG(stage,px){
  let o='';const padTop=6;
  let W,H;
  if(stage===0){ /* tent */
    W=14;H=10;
    for(let r=0;r<8;r++){const inset=7-r;o+=R(inset,r+2,(W-inset*2),1,r%2?'#b0553a':'#ef7d57',px);}
    o+=R(6,7,2,3,'#2a1c10',px);
    o+=R(6,0,1,2,'#8a6020',px)+'<g class="flagw">'+R(7,0,3,2,'#ffcd75',px)+'</g>';
  }else{
    const floors=stage;                 // 1..4
    W=14+stage*3;
    const roofRows=4,floorH=6,bodyH=floors*floorH+1;
    H=roofRows+bodyH;
    const wall=['','#7a5a34','#8a6a3e','#9a5a48','#a86050'][stage];
    const wallD=['','#4d3820','#54401f','#5e352a','#6a3a30'][stage];
    const top=roofRows;
    if(stage>=4)o+='<rect x="'+(-2*px)+'" y="'+(-2*px)+'" width="'+((W+4)*px)+'" height="'+((H+4)*px)+'" fill="#ffcd75" opacity=".12"/>';
    o+=R(0,top,W,bodyH,wallD,px);
    o+=R(1,top+1,W-2,bodyH-2,wall,px);
    for(let f=1;f<floors;f++)o+=R(1,top+f*floorH,W-2,1,wallD,px);
    for(let r=0;r<roofRows;r++){const inset=(roofRows-r)*2;const rw=W-inset*2+2;if(rw>0)o+=R(inset-1,r,rw,1,r===0?'#7d2b3a':'#b13e53',px);}
    o+=R(-1,roofRows-1,W+2,1,'#7d2b3a',px);
    for(let f=0;f<floors;f++){
      const wy=top+2+f*floorH;
      for(let wx=2;wx<=W-4;wx+=4){
        const isGround=(f===floors-1);
        const doorL=Math.floor(W/2)-2,doorR=Math.floor(W/2)+2;
        if(isGround&&wx+2>doorL&&wx<doorR)continue;
        o+=R(wx,wy,2,3,'#5a4a20',px)+R(wx,wy,2,2,'#ffe9a8',px);
      }
    }
    const dx=Math.floor(W/2)-2,dy=top+bodyH-5;
    o+=R(dx,dy,4,5,wallD,px)+R(dx+1,dy+1,2,4,'#2a1c10',px)+R(dx+2,dy+3,1,1,'#ffcd75',px);
    // chimney + smoke
    o+=R(W-5,-2,2,3,'#5a3a2a',px);
    o+='<g class="smoke">'+R(W-5,-4,1,1,'#8a92a8',px)+'</g><g class="smoke2">'+R(W-4,-5,1,1,'#8a92a8',px)+'</g>';
    // fence + garden from stage2
    if(stage>=2){
      for(let f=-4;f<0;f+=2)o+=R(f,top+bodyH-3,1,3,'#8a6a3e',px);
      for(let f=W+1;f<W+5;f+=2)o+=R(f,top+bodyH-3,1,3,'#8a6a3e',px);
      o+=R(-4,top+bodyH-2,4,1,'#8a6a3e',px)+R(W+1,top+bodyH-2,4,1,'#8a6a3e',px);
    }
    if(stage>=3){ // garden bushes + flowers
      o+=R(-4,top+bodyH-4,2,2,'#38b764',px)+R(W+3,top+bodyH-4,2,2,'#38b764',px);
      o+=R(-3,top+bodyH-5,1,1,'#d867c0',px)+R(W+4,top+bodyH-5,1,1,'#ffcd75',px);
    }
    if(stage>=4){ // golden flag tower
      o+=R(2,-4,3,8,'#9a5a48',px)+R(2,-5,3,1,'#7d2b3a',px);
      o+=R(3,-8,1,3,'#8a6020',px)+'<g class="flagw">'+R(4,-8,3,2,'#ffcd75',px)+'</g>';
    }
  }
  return {svg:'<svg width="'+((W+10)*px)+'" height="'+((H+padTop+2)*px)+'" shape-rendering="crispEdges" style="overflow:visible"><g transform="translate('+(5*px)+','+(padTop*px)+')">'+o+'</g></svg>',
          W:(W+10)*px,H:(H+padTop+2)*px};
}

/* ── pixel pine tree ── */
function treeSVG(px){
  let o='';
  for(let r=0;r<6;r++){const inset=5-Math.min(5,r+Math.floor(r/2));o+=R(inset,r+1,10-inset*2,1,r%2?'#245231':'#2f6b40',px);}
  o+=R(4,7,2,3,'#5a3a2a',px);
  return '<g shape-rendering="crispEdges">'+o+'</g>';
}

/* ═══════════ village scene ═══════════ */
const SCENE_W=1560,SCENE_H=520,GROUND=452;
function renderVillage(){
  const wrap=document.getElementById('sceneWrap');
  let o='';
  // sky
  o+='<rect width="'+SCENE_W+'" height="360" fill="#0d0f1c"/>';
  o+='<rect y="340" width="'+SCENE_W+'" height="40" fill="#141731"/>';
  // stars (deterministic)
  for(let i=0;i<70;i++){
    const x=Math.floor((Math.sin(i*127.1)*.5+.5)*SCENE_W);
    const y=Math.floor((Math.sin(i*311.7)*.5+.5)*300);
    o+='<rect x="'+x+'" y="'+y+'" width="3" height="3" fill="#f4f4f4" class="'+(i%3===0?'tw':i%3===1?'tw2':'')+'" opacity=".8"/>';
  }
  // pixel moon
  o+='<g transform="translate(1400,56)" shape-rendering="crispEdges">'
    +R(1,0,4,1,'#ffe9a8',7)+R(0,1,6,4,'#ffe9a8',7)+R(1,5,4,1,'#ffe9a8',7)
    +R(1,1,2,2,'#f0d288',7)+R(3,3,2,1,'#f0d288',7)
    +'</g>';
  // mountains (stepped silhouette)
  for(let x=0;x<SCENE_W;x+=26){
    const h=60+Math.floor((Math.sin(x*.008)*.5+.5)*110);
    o+='<rect x="'+x+'" y="'+(380-h)+'" width="26" height="'+h+'" fill="#151830"/>';
  }
  // ground
  o+='<rect y="380" width="'+SCENE_W+'" height="'+(SCENE_H-380)+'" fill="#1b2b21"/>';
  o+='<rect y="380" width="'+SCENE_W+'" height="4" fill="#28402f"/>';
  // grass specks
  for(let i=0;i<90;i++){
    const x=Math.floor((Math.sin(i*91.3)*.5+.5)*SCENE_W);
    const y=390+Math.floor((Math.sin(i*57.7)*.5+.5)*110);
    o+='<rect x="'+x+'" y="'+y+'" width="3" height="3" fill="#28402f"/>';
  }
  // path
  o+='<rect y="'+GROUND+'" width="'+SCENE_W+'" height="26" fill="#5c4b30"/>';
  o+='<rect y="'+GROUND+'" width="'+SCENE_W+'" height="3" fill="#6e5a3a"/>';
  for(let x=10;x<SCENE_W;x+=42)o+='<rect x="'+x+'" y="'+(GROUND+10)+'" width="14" height="4" fill="#6e5a3a"/>';
  // trees between lots
  [40,470,940,1490].forEach((x,i)=>{
    o+='<g transform="translate('+x+','+(GROUND-66)+')">'+treeSVG(6)+'</g>';
    if(i%2)o+='<g transform="translate('+(x+38)+','+(GROUND-48)+')">'+treeSVG(4.4)+'</g>';
  });
  // fireflies
  [[240,368],[700,352],[1180,372]].forEach((p,i)=>{
    o+='<rect x="'+p[0]+'" y="'+p[1]+'" width="4" height="4" fill="#ffcd75" class="'+(i%2?'ff':'ff2')+'"/>';
  });

  /* buildings — house at center */
  const order=['work','focus','health','HOUSE','care','fun','habit'];
  const xs=[90,330,560,760,1020,1250,1440];
  order.forEach((id,i)=>{
    const cx=xs[i];
    if(id==='HOUSE'){
      const hs=houseStage(totalLevel());
      const b=houseSVG(hs,5);
      o+='<g class="bpoi" data-nav="home" transform="translate('+(cx-b.W/2)+','+(GROUND-b.H+10)+')">'
        +'<rect class="bglow" width="'+b.W+'" height="'+b.H+'" fill="#ffcd75" opacity="0"/>'
        +b.svg.replace('<svg','<svg x="0" y="0"')
        +'</g>';
      // hazel sprite by the house
      o+='<g class="hz-idle" transform="translate('+(cx+b.W/2+6)+','+(GROUND-72)+')">'+spriteSVG(charStage(totalLevel()),4).replace('<svg','<svg x="0" y="0"')+'</g>';
      o+=chip(cx,'🏠 하젤의 집','Lv.'+totalLevel());
    }else{
      const st=STATS.find(s=>s.id===id);
      const lv=statLevel(id),bs=buildStage(lv);
      const b=buildingSVG(st,bs,4.6);
      o+='<g class="bpoi" data-nav="'+id+'" transform="translate('+(cx-b.W/2)+','+(GROUND-b.H+8)+')">'
        +'<rect class="bglow" width="'+b.W+'" height="'+b.H+'" fill="'+st.c+'" opacity="0"/>'
        +b.svg.replace('<svg','<svg x="0" y="0"')
        +'</g>';
      o+=chip(cx,st.ico+' '+st.stages[bs],'Lv.'+lv);
    }
  });
  function chip(cx,t1,t2){
    const w=Math.max(t1.length*11+26,80);
    return '<g transform="translate('+(cx-w/2)+','+(GROUND+34)+')">'
      +'<rect width="'+w+'" height="34" fill="#141625" stroke="#566c86" stroke-width="2"/>'
      +'<text x="'+(w/2)+'" y="15" text-anchor="middle" font-size="11" fill="#f4f4f4" font-family="DungGeunMo,monospace">'+t1+'</text>'
      +'<text x="'+(w/2)+'" y="29" text-anchor="middle" font-size="10" fill="#ffcd75" font-family="DungGeunMo,monospace">'+t2+'</text>'
      +'</g>';
  }
  wrap.innerHTML='<svg viewBox="0 0 '+SCENE_W+' '+SCENE_H+'" width="'+SCENE_W+'" height="'+SCENE_H+'">'+o+'</svg>';
  // tap handlers
  wrap.querySelectorAll('.bpoi').forEach(g=>{
    g.addEventListener('click',()=>{
      const nav=g.getAttribute('data-nav');
      if(nav==='home')showScreen('scrHome','navHome');
      else openBuilding(nav);
    });
  });
  // HUD
  document.getElementById('hudLv').textContent='Lv.'+totalLevel();
  document.getElementById('hudToday').textContent=state.today.n;
  document.getElementById('hudQuests').textContent=state.quests.length;
}

/* ═══════════ navigation ═══════════ */
const $=id=>document.getElementById(id);
let currentStat=null;
function showScreen(id,navId){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  $(id).classList.add('on');
  ['navVillage','navHome'].forEach(n=>$(n).classList.remove('on'));
  if(navId)$(navId).classList.add('on');
  window.scrollTo(0,0);
}
$('navVillage').addEventListener('click',()=>{renderVillage();showScreen('scrVillage','navVillage');});
$('navHome').addEventListener('click',()=>{renderHome();showScreen('scrHome','navHome');});

/* ═══════════ building detail ═══════════ */
function openBuilding(id){
  currentStat=id;
  renderDetail();
  showScreen('scrDetail',null);
}
function renderDetail(){
  const st=STATS.find(s=>s.id===currentStat);
  const lv=statLevel(st.id),bs=buildStage(lv),p=statProg(st.id);
  $('dTag').textContent=st.ico+' '+st.nm+' · '+st.sub;
  $('dLvChip').textContent='Lv.'+lv;
  $('dBuild').innerHTML=buildingSVG(st,bs,7).svg;
  $('dStageNm').innerHTML='<b>'+st.stages[bs]+'</b> <span style="color:#6b7396">('+(bs+1)+'/5단계)</span>';
  $('dBarTxt').textContent=p+' / '+XP_PER_LEVEL;
  $('dBar').style.width=(p/XP_PER_LEVEL*100)+'%';
  $('dBar').style.setProperty('--c',st.c);
  $('dNext').textContent=bs>=4?'★ 최종 진화 완료! 마을의 자랑이다':'다음 진화 → Lv.'+BUILD_LV[bs+1]+' 「'+st.stages[bs+1]+'」';
  renderDetailQuests();
}
function renderDetailQuests(){
  const list=state.quests.filter(q=>q.stat===currentStat);
  $('dQCount').textContent='진행 중 '+list.length+'개';
  const box=$('dQList');
  if(!list.length){box.innerHTML='<div class="empty">이 공간의 퀘스트가 없다.<br>위에서 등록하고 건물을 키우자 ▲</div>';return;}
  box.innerHTML=list.map(q=>
    '<div class="quest" data-id="'+q.id+'">'
    +'<button class="chk" data-act="done" aria-label="퀘스트 완료">…</button>'
    +'<div class="qt">'+esc(q.text)+'<div class="qm">+'+q.xp+' XP</div></div>'
    +'<button class="del" data-act="del" aria-label="퀘스트 삭제">✕</button></div>'
  ).join('');
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

$('dQAdd').addEventListener('click',()=>{
  const t=$('dQText').value.trim();
  if(!t)return $('dQText').focus();
  state.quests.unshift({id:Date.now()+''+Math.floor(Math.random()*999),text:t,stat:currentStat,xp:+$('dQDiff').value});
  $('dQText').value='';
  saveState();renderDetailQuests();
  $('hudQuests').textContent=state.quests.length;
});
$('dQText').addEventListener('keydown',e=>{if(e.key==='Enter')$('dQAdd').click();});

$('dQList').addEventListener('click',e=>{
  const btn=e.target.closest('[data-act]');if(!btn)return;
  const card=btn.closest('.quest');
  const q=state.quests.find(x=>x.id===card.dataset.id);if(!q)return;
  if(btn.dataset.act==='del'){
    state.quests=state.quests.filter(x=>x.id!==q.id);
    saveState();renderDetailQuests();return;
  }
  completeQuest(q,btn);
});

/* ═══════════ quest completion & dreams ═══════════ */
function completeQuest(q,anchor){
  const st=STATS.find(s=>s.id===q.stat);
  const beforeLv=statLevel(q.stat);
  const beforeB=buildStage(beforeLv);
  const beforeH=houseStage(totalLevel());
  state.xp[q.stat]=(state.xp[q.stat]||0)+q.xp;
  state.quests=state.quests.filter(x=>x.id!==q.id);
  state.cleared++;state.today.n++;
  state.log.unshift({text:q.text,stat:q.stat,xp:q.xp});
  state.log=state.log.slice(0,20);
  const afterLv=statLevel(q.stat);
  const afterB=buildStage(afterLv);
  const afterH=houseStage(totalLevel());
  // record dreams
  if(afterB>beforeB)state.dreams.unshift({t:st.ico+' 「'+st.stages[afterB]+'」 완공',d:todayStr()});
  if(afterH>beforeH)state.dreams.unshift({t:'🏠 하젤의 집 → 「'+HOUSE_STAGES[afterH].nm+'」',d:todayStr()});
  state.dreams=state.dreams.slice(0,30);
  saveState();
  floatXp(anchor,'+'+q.xp+' XP');
  renderDetail();
  // modal priority: house > building > level-up
  if(afterH>beforeH){
    showModal('꿈이 이루어졌다!',houseSVG(afterH,4).svg,
      '레벨업의 힘으로 하젤의 집이<br><b>「'+HOUSE_STAGES[afterH].nm+'」</b>(으)로 견고해졌다!');
  }else if(afterB>beforeB){
    showModal('드림 달성!',buildingSVG(st,afterB,4).svg,
      st.ico+' '+st.nm+'의 꿈이 자라나<br><b>「'+st.stages[afterB]+'」</b>이(가) 완공되었다!');
  }else if(afterLv>beforeLv){
    showModal('LEVEL UP!',buildingSVG(st,afterB,4).svg,
      st.ico+' <b>'+st.nm+'</b> Lv.'+beforeLv+' → <b>Lv.'+afterLv+'</b><br>건물이 더 단단해지고 있다…');
  }
}
function floatXp(anchor,txt){
  const r=anchor.getBoundingClientRect();
  const el=document.createElement('div');
  el.className='fxp';el.textContent=txt;
  el.style.left=(r.left+r.width/2-20)+'px';
  el.style.top=(r.top-8)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),950);
}

/* ═══════════ home screen ═══════════ */
function renderHome(){
  const lv=totalLevel(),hs=houseStage(lv);
  $('hHouse').innerHTML=houseSVG(hs,6).svg;
  $('hSprite').innerHTML=spriteSVG(charStage(lv),5);
  $('hHouseNm').textContent=HOUSE_STAGES[hs].nm+' ('+(hs+1)+'/5)';
  $('hLv').textContent='Lv.'+lv;
  $('hTitle').textContent=currentTitle();
  $('hClear').textContent=state.cleared;
  renderRadar();
  $('hStats').innerHTML=STATS.map(s=>{
    const l=statLevel(s.id),p=statProg(s.id),bs=buildStage(l);
    return '<div class="stat"><div class="ico">'+s.ico+'</div><div class="meta">'
      +'<div class="nm"><span>'+s.nm+' <span style="color:#6b7396;font-size:.6rem">'+s.stages[bs]+'</span></span><span class="lv">Lv.'+l+'</span></div>'
      +'<div class="bar"><i style="--c:'+s.c+';width:'+(p/XP_PER_LEVEL*100)+'%"></i></div>'
      +'</div></div>';
  }).join('');
  const dl=$('dreamList');
  if(!state.dreams.length){
    dl.innerHTML='<div class="empty">아직 이루어진 드림이 없다.<br>퀘스트를 깨서 첫 건물을 지어 보자!</div>';
  }else{
    dl.innerHTML=state.dreams.map(d=>'<div class="dream"><span class="dd">'+d.d+'</span><span>'+d.t+'</span></div>').join('');
  }
}
function renderRadar(){
  const svg=$('radar');
  const cx=124,cy=102,Rr=80;
  const maxLv=Math.max(6,...STATS.map(s=>statLevel(s.id)));
  const pt=(i,r)=>{const a=-Math.PI/2+i*Math.PI/3;return [cx+Math.cos(a)*r,cy+Math.sin(a)*r];};
  let out='';
  [0.33,0.66,1].forEach(f=>{
    out+='<polygon points="'+STATS.map((_,i)=>pt(i,Rr*f).join(',')).join(' ')+'" fill="none" stroke="#3a415f" stroke-width="2"/>';
  });
  STATS.forEach((_,i)=>{const [x,y]=pt(i,Rr);out+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x+'" y2="'+y+'" stroke="#3a415f" stroke-width="2"/>';});
  out+='<polygon points="'+STATS.map((s,i)=>pt(i,Rr*(statLevel(s.id)/maxLv)).join(',')).join(' ')+'" fill="rgba(255,205,117,.28)" stroke="#ffcd75" stroke-width="2"/>';
  STATS.forEach((s,i)=>{
    const [vx,vy]=pt(i,Rr*(statLevel(s.id)/maxLv));
    out+='<rect x="'+(vx-3)+'" y="'+(vy-3)+'" width="6" height="6" fill="'+s.c+'"/>';
    const [lx,ly]=pt(i,Rr+16);
    out+='<text x="'+lx+'" y="'+(ly+3)+'" text-anchor="middle" font-size="10" fill="#94b0c2" font-family="DungGeunMo,monospace">'+s.ico+s.nm+'</text>';
  });
  svg.innerHTML=out;
}

/* ═══════════ modal & reset ═══════════ */
function showModal(big,artSvg,html){
  $('modBig').textContent=big;
  $('modArt').innerHTML=artSvg;
  $('modTxt').innerHTML=html;
  $('mod').classList.add('on');
}
$('modOk').addEventListener('click',()=>$('mod').classList.remove('on'));
$('mod').addEventListener('click',e=>{if(e.target===$('mod'))$('mod').classList.remove('on');});
$('resetBtn').addEventListener('click',()=>{
  if(!confirm('마을 전체를 초기화할까? 모든 건물과 드림 기록이 사라져!'))return;
  state=defaultState();saveState();
  renderHome();renderVillage();showScreen('scrVillage','navVillage');
});

/* ═══════════ boot ═══════════ */
renderVillage();
// center the scroll on the house
requestAnimationFrame(()=>{
  const w=document.getElementById('sceneWrap');
  const svgW=w.scrollWidth;
  w.scrollLeft=Math.max(0,svgW*0.42-w.clientWidth/2);
});
</script>
