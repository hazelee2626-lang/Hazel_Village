<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗺️ 하젤마을 지도</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --parch:#f4ead0; --parch2:#ede0bb; --parch3:#e5d4a4;
  --ink:#3a2a10; --ink2:#5a3e1a; --ink3:#7a5828;
  --red:#c2382a; --blue:#3a6090; --sage:#5a7a4a;
  --rose:#c27858; --gold:#c89828;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#2a1e0a}
body{font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center}

/* ── OUTER FRAME ── */
.frame{
position:relative;
width:min(99vw,960px);height:min(97vh,590px);
border-radius:6px;overflow:hidden;
box-shadow:
0 0 0 3px #8a6020,
0 0 0 8px #2a1e0a,
0 0 0 12px #6a4810,
0 0 0 18px #1a1006,
0 40px 120px rgba(0,0,0,.8)
}

.screen{position:absolute;inset:0;transition:opacity .55s ease,transform .55s ease}
.screen.gone{opacity:0;transform:scale(.97);pointer-events:none}
svg.sc{width:100%;height:100%;display:block}

/* ── SHARED: DECORATIVE BORDER WITHIN SVG ── */

/* ── NAV ── */
.mapnav{
position:absolute;top:10px;left:10px;right:10px;
display:flex;align-items:center;justify-content:space-between;
z-index:50;pointer-events:none
}
.nav-back{
pointer-events:all;
background:rgba(244,234,208,.88);border:1.5px solid #8a6020;
border-radius:3px;padding:5px 16px;cursor:pointer;
font-family:‘IM Fell English’,serif;font-size:13px;
color:#3a2a10;letter-spacing:.5px;
transition:all .2s;box-shadow:1px 2px 6px rgba(0,0,0,.25)
}
.nav-back:hover{background:var(–parch3);transform:translateY(-1px);box-shadow:2px 4px 10px rgba(0,0,0,.3)}
.nav-title{
font-family:‘Playfair Display’,serif;font-size:16px;font-weight:700;
color:#3a2a10;letter-spacing:1px;pointer-events:none;
text-shadow:1px 1px 0 rgba(244,234,208,.8)
}

/* ── POI hover ── */
.poi{cursor:pointer}
.poi .bld{transition:filter .25s}
.poi:hover .bld{filter:brightness(1.06) drop-shadow(0 4px 14px rgba(58,42,16,.45)) drop-shadow(0 0 10px rgba(194,56,42,.3))}
.poi .lbl{transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.poi:hover .lbl{transform:translateY(-4px)}
.rz{cursor:pointer}
.rz .rfill{transition:opacity .2s}
.rz:hover .rfill{opacity:.85}
.rz:hover .rdeco{filter:brightness(1.08)}

/* ── OVERLAY ── */
.ov{
position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;
background:rgba(30,18,4,.62);backdrop-filter:blur(6px);
opacity:0;pointer-events:none;transition:opacity .3s
}
.ov.show{opacity:1;pointer-events:all}
.scroll{
background:var(–parch);
border-radius:4px;max-width:420px;width:93%;overflow:hidden;max-height:88vh;overflow-y:auto;
box-shadow:
0 0 0 1px #8a6020,0 0 0 5px rgba(42,30,10,.8),0 0 0 7px #6a4810,
0 32px 80px rgba(0,0,0,.55);
transform:scale(.88) translateY(24px);
transition:transform .4s cubic-bezier(.34,1.56,.64,1)
}
.ov.show .scroll{transform:scale(1) translateY(0)}
/* Top torn-paper edge */
.scroll-top{
height:24px;background:var(–parch2);
clip-path:polygon(0 100%,2% 60%,5% 80%,8% 40%,11% 70%,14% 50%,17% 80%,20% 55%,23% 75%,26% 45%,29% 70%,32% 50%,35% 78%,38% 52%,41% 72%,44% 48%,47% 70%,50% 50%,53% 75%,56% 48%,59% 68%,62% 44%,65% 72%,68% 50%,71% 74%,74% 46%,77% 68%,80% 50%,83% 74%,86% 52%,89% 70%,92% 46%,95% 68%,98% 52%,100% 65%,100% 100%);
}
.scroll-hdr{padding:14px 22px 12px;border-bottom:1px solid rgba(138,96,32,.3);display:flex;align-items:flex-start;gap:14px;
background:linear-gradient(180deg,var(–parch2),var(–parch))}
.scroll-ico{font-size:38px;flex-shrink:0}
.scroll-ttl{font-family:‘Playfair Display’,serif;font-size:18px;font-weight:700;color:var(–ink);margin-bottom:3px}
.scroll-sub{font-size:10.5px;color:var(–ink3);font-style:italic;line-height:1.6;font-family:‘IM Fell English’,serif}
.scroll-body{padding:14px 20px}
.mappage{background:rgba(255,255,255,.35);border-radius:3px;border:1px solid rgba(138,96,32,.3);overflow:hidden}
.maphdr{background:linear-gradient(135deg,rgba(138,96,32,.14),rgba(138,96,32,.06));padding:9px 15px;border-bottom:1px solid rgba(138,96,32,.2)}
.maphdr-t{font-family:‘Playfair Display’,serif;font-size:13px;font-weight:700;color:var(–ink)}
.mi{display:flex;align-items:center;gap:11px;padding:8px 15px;border-bottom:1px solid rgba(138,96,32,.12);
font-size:12px;color:var(–ink2);transition:background .15s}
.mi:last-child{border-bottom:none}
.mi:hover{background:rgba(138,96,32,.07)}
.mdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.scroll-ft{padding:10px 20px 16px;display:flex;justify-content:center;border-top:1px solid rgba(138,96,32,.2)}
/* Bottom torn edge */
.scroll-bot{
height:22px;background:var(–parch2);
clip-path:polygon(0 0,2% 40%,5% 20%,8% 55%,11% 28%,14% 50%,17% 22%,20% 48%,23% 26%,26% 52%,29% 30%,32% 52%,35% 22%,38% 48%,41% 28%,44% 52%,47% 30%,50% 52%,53% 24%,56% 52%,59% 30%,62% 56%,65% 28%,68% 52%,71% 26%,74% 54%,77% 30%,80% 52%,83% 26%,86% 50%,89% 30%,92% 54%,95% 30%,98% 48%,100% 32%,100% 0);
}
.close-btn{
background:transparent;border:1.5px solid rgba(138,96,32,.55);border-radius:3px;
padding:8px 34px;font-family:‘IM Fell English’,serif;font-size:14px;
color:var(–ink2);cursor:pointer;letter-spacing:1px;transition:all .22s
}
.close-btn:hover{background:rgba(138,96,32,.1);border-color:var(–ink2);transform:scale(1.03)}

/* Animations */
@keyframes flagWave{0%,100%{transform:skewX(0deg)}50%{transform:skewX(4deg)}}
@keyframes smokeDrift{0%{opacity:.55;transform:translate(0,0) scale(.6)}100%{opacity:0;transform:translate(-3px,-30px) scale(1.6)}}
@keyframes bobFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes stampAppear{0%{opacity:0;transform:scale(.6) rotate(-8deg)}100%{opacity:1;transform:scale(1) rotate(-5deg)}}
@keyframes waterRipple{0%,100%{rx:12;opacity:.35}50%{rx:16;opacity:.55}}
@keyframes treeSway{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(1.5deg)}}

.fw{animation:flagWave 2.8s ease-in-out infinite;transform-box:fill-box;transform-origin:0% 50%}
.sm{animation:smokeDrift 3.5s ease-out infinite}
.sm2{animation:smokeDrift 3.5s ease-out infinite 1.2s}
.sm3{animation:smokeDrift 3.5s ease-out infinite 2.4s}
.bob{animation:bobFloat 3s ease-in-out infinite}
.bob2{animation:bobFloat 3.8s ease-in-out infinite .7s}
.stamp{animation:stampAppear .6s cubic-bezier(.34,1.56,.64,1) .3s both}
.wr{animation:waterRipple 2.8s ease-in-out infinite}
.wr2{animation:waterRipple 2.8s ease-in-out infinite .9s}
.wr3{animation:waterRipple 2.8s ease-in-out infinite 1.8s}
.ts{animation:treeSway 3.2s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%}
.ts2{animation:treeSway 4s ease-in-out infinite .8s;transform-box:fill-box;transform-origin:50% 100%}
</style>

</head>
<body>
<div class="frame">

<!-- ═══════════════ VILLAGE MAP ═══════════════ -->

<div id="s1" class="screen">
<svg class="sc" viewBox="0 0 960 590" preserveAspectRatio="xMidYMid slice">
<defs>
  <!-- Parchment texture using feTurbulence -->
  <filter id="parch">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
    <feBlend in="SourceGraphic" in2="grey" mode="multiply" result="blend"/>
    <feComposite in="blend" in2="SourceGraphic" operator="in"/>
  </filter>
  <filter id="inkBleed">
    <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="2" seed="2" result="t"/>
    <feDisplacementMap in="SourceGraphic" in2="t" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="softDrop">
    <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#3a2a10" flood-opacity=".28"/>
  </filter>
  <filter id="heavyDrop">
    <feDropShadow dx="3" dy="7" stdDeviation="9" flood-color="#3a2a10" flood-opacity=".38"/>
  </filter>
  <filter id="wc">
    <feTurbulence type="fractalNoise" baseFrequency=".04" numOctaves="4" seed="8" result="t"/>
    <feDisplacementMap in="SourceGraphic" in2="t" scale="6" xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <!-- Watercolour blobs (rough edges) -->

  <radialGradient id="wcGreen" cx="50%" cy="48%">
    <stop offset="0%" stop-color="#7aaa5a" stop-opacity=".55"/>
    <stop offset="60%" stop-color="#5a8a3a" stop-opacity=".38"/>
    <stop offset="100%" stop-color="#3a6a1a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="wcBlue" cx="48%" cy="44%">
    <stop offset="0%" stop-color="#7aaccc" stop-opacity=".6"/>
    <stop offset="55%" stop-color="#4a80a8" stop-opacity=".45"/>
    <stop offset="100%" stop-color="#2a5880" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="wcRose" cx="50%" cy="48%">
    <stop offset="0%" stop-color="#d89870" stop-opacity=".55"/>
    <stop offset="55%" stop-color="#b87850" stop-opacity=".4"/>
    <stop offset="100%" stop-color="#906040" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="wcSage" cx="50%" cy="50%">
    <stop offset="0%" stop-color="#8aaa6a" stop-opacity=".5"/>
    <stop offset="100%" stop-color="#5a8a3a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="wcGold" cx="50%" cy="50%">
    <stop offset="0%" stop-color="#c8a838" stop-opacity=".45"/>
    <stop offset="100%" stop-color="#a88018" stop-opacity="0"/>
  </radialGradient>
  <pattern id="crosshatch" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="8" y2="8" stroke="#3a2a10" stroke-width=".4" opacity=".2"/>
    <line x1="8" y1="0" x2="0" y2="8" stroke="#3a2a10" stroke-width=".4" opacity=".18"/>
  </pattern>
  <pattern id="dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
    <circle cx="5" cy="5" r=".9" fill="#3a2a10" opacity=".22"/>
  </pattern>
</defs>

<!-- ── ILLUSTRATED TREES ── -->

<!-- Cluster LEFT top -->

  <g class="ts2"><ellipse cx="56" cy="132" rx="22" ry="28" fill="#5a8a3a" opacity=".82" filter="url(#wc)"/>
    <ellipse cx="56" cy="120" rx="16" ry="20" fill="#7aaa5a" opacity=".7" filter="url(#wc)"/>

<script>
function go(from,to){
  document.getElementById(from).classList.add('gone');
  document.getElementById(to).classList.remove('gone');
}
function showWork(){document.getElementById('wov').classList.add('show')}
function showRoom(name,ico,dash,color,items){
  document.getElementById('rico').textContent=ico;
  document.getElementById('rttl').textContent=name+' → '+dash;
  document.getElementById('rsub').textContent='이 방을 탭하면 Notion 대시보드로 이동합니다';
  document.getElementById('rpttl').textContent=ico+' '+dash;
  const c=document.getElementById('ritems');
  c.innerHTML='';
  items.forEach(t=>{
    const d=document.createElement('div');d.className='mi';
    d.innerHTML=`<span class="mdot" style="background:${color}"></span>${t}`;
    c.appendChild(d);
  });
  document.getElementById('rov').classList.add('show');
}
function closeOv(id){document.getElementById(id).classList.remove('show')}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.ov').forEach(o=>o.classList.remove('show'))
})
</script>
